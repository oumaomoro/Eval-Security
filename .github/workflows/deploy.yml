name: Deploy Costloci Enterprise

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERCEL_ORG_ID: "team_e3jJx67pD2yUoOEFo8QBBt2q"
  VERCEL_PROJECT_ID: "prj_RQI3dWgrvHuw31ciB5GGaEmCOSEY"

# Prevent concurrent deployments
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Pre-flight — validate all required secrets exist
  # ─────────────────────────────────────────────────────────────
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    steps:
      - name: Validate Required Secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AI_INTEGRATIONS_OPENAI_API_KEY: ${{ secrets.AI_INTEGRATIONS_OPENAI_API_KEY }}
          AI_INTEGRATIONS_OPENAI_BASE_URL: ${{ secrets.AI_INTEGRATIONS_OPENAI_BASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SIGNNOW_API_KEY: ${{ secrets.SIGNNOW_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
          VITE_PAYSTACK_PUBLIC_KEY: ${{ secrets.VITE_PAYSTACK_PUBLIC_KEY }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          SLACK_APP_ID: ${{ secrets.SLACK_APP_ID }}
          SLACK_CLIENT_ID: ${{ secrets.SLACK_CLIENT_ID }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_VERIFICATION_TOKEN: ${{ secrets.SLACK_VERIFICATION_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        shell: bash
        run: |
          MISSING=()

          # Forensic Validation Batch 1: Core Infrastructure (Blocking)
          REQUIRED_SECRETS=(
            "VERCEL_TOKEN" "VITE_API_URL" "SUPABASE_URL" "SUPABASE_ANON_KEY" "SUPABASE_SERVICE_ROLE_KEY"
            "DATABASE_URL" "AI_INTEGRATIONS_OPENAI_API_KEY" "AI_INTEGRATIONS_OPENAI_BASE_URL" 
            "JWT_SECRET" "RESEND_API_KEY" "SIGNNOW_API_KEY" "UPSTASH_REDIS_REST_URL" 
            "UPSTASH_REDIS_REST_TOKEN" "CLOUDFLARE_ACCOUNT_ID" "CLOUDFLARE_API_TOKEN" 
            "PAYSTACK_SECRET_KEY" "VITE_PAYSTACK_PUBLIC_KEY" "FRONTEND_URL" "GOOGLE_CLIENT_SECRET"
          )

          # Forensic Validation Batch 2: Modular Integrations (Non-Blocking / Warning only)
          OPTIONAL_SECRETS=(
            "GOOGLE_CLIENT_ID" "SLACK_APP_ID" "SLACK_CLIENT_ID" 
            "SLACK_SIGNING_SECRET" "SLACK_VERIFICATION_TOKEN" "CRON_SECRET"
          )

          MISSING=()
          for secret in "${REQUIRED_SECRETS[@]}"; do
            if [ -z "${!secret}" ]; then
              MISSING+=("$secret")
            fi
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ CRITICAL DEPLOYMENT BLOCKED — Missing required core secrets:"
            for secret in "${MISSING[@]}"; do echo "   • $secret"; done
            echo ""
            echo "👉 Ensure these are set in Settings → Secrets and variables → Actions"
            exit 1
          fi

          echo "✅ Core enterprise secrets verified."
          
          for secret in "${OPTIONAL_SECRETS[@]}"; do
             if [ -z "${!secret}" ]; then
               echo "⚠️  Optional integration secret missing: $secret. Associated features may be degraded."
             fi
          done
          
          echo "🚀 Proceeding with deployment."

      - name: Verify Cloudflare Connectivity
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "📡 Testing Cloudflare API connectivity..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "https://api.cloudflare.com/client/v4/user/tokens/verify" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type:application/json")
            if [ "$RESPONSE" != "200" ]; then
              echo "⚠️  Cloudflare token warning (HTTP $RESPONSE) — deployment will use runner OAuth session."
            else
              echo "✅ Cloudflare API verified."
            fi
          else
            echo "⚠️  CLOUDFLARE_API_TOKEN not set — deployment will use runner OAuth session."
          fi

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Type-check + Build
  # ─────────────────────────────────────────────────────────────
  build:
    name: Type Check & Build
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: TypeScript Check
        run: npm run check

      - name: Build (Client + Server)
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_PAYSTACK_PUBLIC_KEY: ${{ secrets.VITE_PAYSTACK_PUBLIC_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Deploy Frontend → Cloudflare Pages
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy dist/public \
            --project-name=costloci-frontend \
            --branch=main \
            --commit-dirty=true

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Deploy Backend → Vercel
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Vercel
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Vercel Pull + Build + Deploy (Prebuilt)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AI_INTEGRATIONS_OPENAI_API_KEY: ${{ secrets.AI_INTEGRATIONS_OPENAI_API_KEY }}
          AI_INTEGRATIONS_OPENAI_BASE_URL: ${{ secrets.AI_INTEGRATIONS_OPENAI_BASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SIGNNOW_API_KEY: ${{ secrets.SIGNNOW_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
          VITE_PAYSTACK_PUBLIC_KEY: ${{ secrets.VITE_PAYSTACK_PUBLIC_KEY }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          SLACK_APP_ID: ${{ secrets.SLACK_APP_ID }}
          SLACK_CLIENT_ID: ${{ secrets.SLACK_CLIENT_ID }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_VERIFICATION_TOKEN: ${{ secrets.SLACK_VERIFICATION_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NODE_ENV: production
        run: |
          echo "📡 Syncing enterprise secrets to Vercel dashboard..."
          
          # Iterate through core secrets and update Vercel env
          # Note: We use 'vercel env add' to ensure the dashboard matches the build context
          CORE_SECRETS=(
            "DATABASE_URL" "SUPABASE_URL" "SUPABASE_ANON_KEY" "SUPABASE_SERVICE_ROLE_KEY"
            "AI_INTEGRATIONS_OPENAI_API_KEY" "AI_INTEGRATIONS_OPENAI_BASE_URL" "JWT_SECRET"
            "RESEND_API_KEY" "SIGNNOW_API_KEY" "UPSTASH_REDIS_REST_URL" "UPSTASH_REDIS_REST_TOKEN"
            "PAYSTACK_SECRET_KEY" "VITE_PAYSTACK_PUBLIC_KEY" "FRONTEND_URL" "VITE_API_URL"
            "GOOGLE_CLIENT_ID" "GOOGLE_CLIENT_SECRET" "SLACK_APP_ID" "SLACK_CLIENT_ID"
            "SLACK_SIGNING_SECRET" "SLACK_VERIFICATION_TOKEN" "CRON_SECRET"
            "VITE_SUPABASE_URL" "VITE_SUPABASE_ANON_KEY"
          )

          for secret in "${CORE_SECRETS[@]}"; do
            val="${!secret}"
            if [ ! -z "$val" ]; then
              # Attempt to remove existing to avoid conflict, then add
              vercel env rm "$secret" production -y || true
              echo "$val" | vercel env add "$secret" production
            fi
          done

          vercel pull --yes --environment=production
          vercel build --prod
          vercel deploy --prebuilt --prod --yes
