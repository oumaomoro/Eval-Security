# Costloci Production CI/CD
# Zero-cost, automated: push to main → Vercel deploys backend, Cloudflare Pages builds frontend.
# No manual deploys. No secrets in code.

name: 🚀 Production Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── QUALITY GATE ──────────────────────────────────────────────────────────
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cyberoptimize-prod/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cyberoptimize-prod/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test --if-present
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ── BACKEND DEPLOY (Vercel) ───────────────────────────────────────────────
  deploy-backend:
    name: 🔧 Deploy Backend → Vercel
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cyberoptimize-prod/backend/package-lock.json

      - name: Install Dependencies
        run: cd cyberoptimize-prod/backend && npm ci

      - name: Run Database Migrations
        run: cd cyberoptimize-prod/backend && node migrate.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
          working-directory: ./cyberoptimize-prod/backend
          vercel-args: '--prod'

  # ── FRONTEND DEPLOY (Cloudflare Pages) ───────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend → Cloudflare Pages
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: ./cyberoptimize-prod/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cyberoptimize-prod/frontend/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_API_URL: https://api.costloci.com

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: costloci-frontend
          directory: ./cyberoptimize-prod/frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ── HEALTH CHECK ──────────────────────────────────────────────────────────
  verify:
    name: ✅ Production Health Check
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Wait for propagation
        run: sleep 15

      - name: API Health Check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.costloci.com/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ API is healthy (HTTP $STATUS)"

      - name: Frontend Smoke Test
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://costloci.com)
          echo "Frontend status: HTTP $STATUS"
