name: Enterprise Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Centralized Secrets for Linter Stability & Consistency
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}
  SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  # Alias for legacy gateway compatibility
  AI_INTEGRATIONS_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Check (Frontend & Backend)
        run: npm run build
      
      - name: System Health Check
        run: npx tsx scripts/verify-health.ts
      
      - name: Install Playwright
        run: npx playwright install --with-deps
      
      - name: E2E Tests
        run: npx playwright test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-production:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy Backend to Vercel
        if: matrix.target == 'backend'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Deploy Frontend to Cloudflare
        if: matrix.target == 'frontend'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy client/dist --project-name=costloci-frontend --branch=main

  notify:
    needs: [validate, deploy-production]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Success Notification
        if: needs.deploy-production.result == 'success'
        run: |
          echo "🚀 DEPLOYMENT SUCCESSFUL"
          echo "Costloci Sovereign Instance is live at https://costloci.com"
          echo "API Endpoint: https://api.costloci.com"
      - name: Failure Notification
        if: needs.validate.result == 'failure' || needs.deploy-production.result == 'failure'
        run: |
          echo "❌ DEPLOYMENT FAILED"
          echo "Triggering automated rollback protocol (Vercel Instant Rollback enabled)."
