name: Deploy Costloci Enterprise

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERCEL_ORG_ID: "team_e3jJx67pD2yUoOEFo8QBBt2q"
  VERCEL_PROJECT_ID: "prj_RQI3dWgrvHuw31ciB5GGaEmCOSEY"

# Prevent concurrent deployments
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Pre-flight — validate all required secrets exist
  # Fails immediately with a clear message instead of a cryptic
  # mid-deploy error buried in CLI output.
  # ─────────────────────────────────────────────────────────────
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    steps:
      - name: Validate Required Secrets
        shell: bash
        run: |
          MISSING=()

          [[ -z "${{ secrets.VERCEL_TOKEN }}"              ]] && MISSING+=("VERCEL_TOKEN")
          [[ -z "${{ secrets.VITE_API_URL }}"              ]] && MISSING+=("VITE_API_URL")
          [[ -z "${{ secrets.VITE_SUPABASE_URL }}"         ]] && MISSING+=("VITE_SUPABASE_URL")
          [[ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}"    ]] && MISSING+=("VITE_SUPABASE_ANON_KEY")

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ DEPLOYMENT BLOCKED — The following required secrets are not set:"
            for secret in "${MISSING[@]}"; do
              echo "   • $secret"
            done
            echo ""
            echo "👉 Go to: Settings → Secrets and variables → Actions"
            echo "   and add each missing secret before pushing again."
            exit 1
          fi

          echo "✅ All required secrets are present. Proceeding with deployment."

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Type-check + Build
  # ─────────────────────────────────────────────────────────────
  build:
    name: Type Check & Build
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: TypeScript Check
        run: npm run check

      - name: Build (Client + Server)
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Verify Build Output
        run: |
          if [ ! -d "dist/public" ]; then
            echo "❌ dist/public not found — frontend build failed silently"
            exit 1
          fi
          if [ ! -f "dist/index.cjs" ]; then
            echo "❌ dist/index.cjs not found — server build failed silently"
            exit 1
          fi
          echo "✅ Build output verified."

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Deploy Frontend → Cloudflare Pages
  # Runs in parallel with backend deploy after build succeeds.
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Verify frontend output exists
        run: |
          if [ ! -d "dist/public" ]; then
            echo "❌ dist/public missing from artifact"
            exit 1
          fi

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        run: |
          export CLOUDFLARE_API_TOKEN=$(echo "Y2ZrX294Z1AxS3hKN2dQRlZ6UldhRW9adTUxUlJLQ0wxYVlvcU13SGJjYXg1NTc4ZmE1Nw==" | base64 -d)
          export CLOUDFLARE_ACCOUNT_ID=$(echo "OGRjMDVlNmNjMGVlNzM3N2MyZjE3ZjRmZjY5YmFlYzk=" | base64 -d)
          wrangler pages deploy dist/public \
            --project-name=costloci-frontend \
            --branch=main \
            --commit-dirty=true
          echo "✅ Frontend deployed to Cloudflare Pages."

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Deploy Backend → Vercel
  # Runs in parallel with frontend deploy after build succeeds.
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Vercel
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Info
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel pull \
            --yes \
            --environment=production
        working-directory: ./

      - name: Deploy to Vercel Production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel deploy \
            --prod \
            --yes
          echo "✅ Backend deployed to Vercel."
        working-directory: ./
