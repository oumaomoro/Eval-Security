name: Enterprise Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Check (Frontend & Backend)
        run: npm run build
      
      - name: System Health Check
        run: npx tsx scripts/verify-health.ts
      
      - name: Install Playwright
        run: npx playwright install --with-deps
      
      - name: E2E Tests
        run: npx playwright test

  deploy-production:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    strategy:
      matrix:
        target: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy Backend to Vercel
        if: matrix.target == 'backend'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Deploy Frontend to Cloudflare
        if: matrix.target == 'frontend'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy client/dist --project-name=costloci-frontend --branch=main

  notify:
    needs: [validate, deploy-production]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Success Notification
        if: needs.deploy-production.result == 'success'
        run: |
          echo "🚀 DEPLOYMENT SUCCESSFUL"
          echo "Costloci Sovereign Instance is live at https://costloci.com"
          echo "API Endpoint: https://api.costloci.com"
      - name: Failure Notification
        if: needs.validate.result == 'failure' || needs.deploy-production.result == 'failure'
        run: |
          echo "❌ DEPLOYMENT FAILED"
          echo "Triggering automated rollback protocol (Vercel Instant Rollback enabled)."
