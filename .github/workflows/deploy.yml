name: Deploy Costloci

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm install

      - name: Install Global CLIs
        run: npm install -g vercel wrangler

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Build Project
        run: npm run build

      - name: Deploy Backend to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          FRONTEND_URL: https://costloci.com
        run: |
          cd cyberoptimize-prod
          vercel --prod --yes \
            --token=$VERCEL_TOKEN \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            -e SUPABASE_URL="$SUPABASE_URL" \
            -e SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
            -e RESEND_API_KEY="$RESEND_API_KEY" \
            -e OPENAI_API_KEY="$OPENAI_API_KEY" \
            -e JWT_SECRET="$JWT_SECRET" \
            -e GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
            -e GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET" \
            -e FRONTEND_URL="https://costloci.com"

      - name: Deploy Frontend to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy dist/public --project-name=costloci-frontend --branch=main --commit-dirty=true

      - name: Run E2E Authentication Tests
        env:
          TEST_BASE_URL: https://costloci.com
          API_URL: https://api.costloci.com
          TEST_LOGIN_EMAIL: ${{ secrets.TEST_LOGIN_EMAIL }}
          TEST_LOGIN_PASSWORD: ${{ secrets.TEST_LOGIN_PASSWORD }}
        run: npx playwright test tests/auth.spec.ts --reporter=list
        continue-on-error: false

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
